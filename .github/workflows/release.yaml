name: release

on:
  push:
    branches: [master]
    paths:
      - 'Cargo.toml'

concurrency:
  group: release
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      created: ${{ steps.meta.outputs.created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version and check tag
        id: meta
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  build-binary:
    needs: prepare
    if: needs.prepare.outputs.created == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          ARCHIVE="tty-web-${{ matrix.target }}.tar.gz"
          tar czf "${{ runner.temp }}/${ARCHIVE}" -C target/${{ matrix.target }}/release tty-web
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ runner.temp }}/${{ env.ARCHIVE }}
          retention-days: 1

  build-image:
    needs: [prepare, build-binary]
    if: needs.prepare.outputs.created == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.target }}
          path: ${{ runner.temp }}

      - name: Extract binary
        run: |
          mkdir -p target/${{ matrix.target }}/release
          tar xzf "${{ runner.temp }}/tty-web-${{ matrix.target }}.tar.gz" \
            -C target/${{ matrix.target }}/release

      - name: Log in to the Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${PLATFORM_PAIR}"
          docker build --build-arg BINARY=target/${{ matrix.target }}/release/tty-web -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${PLATFORM_PAIR}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" | cut -d@ -f2)
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build-image]
    if: needs.prepare.outputs.created == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Set image name
        run: echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image and get digest
        id: inspect
        run: |
          tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$tag"
          DIGEST=$(docker buildx imagetools inspect "$tag" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true

  release:
    needs: [prepare, build-binary, merge]
    if: needs.prepare.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: ${{ runner.temp }}/binaries
          merge-multiple: true

      - name: Generate checksums
        working-directory: ${{ runner.temp }}/binaries
        run: sha256sum *.tar.gz > checksums-sha256.txt

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --title "tty-web ${{ needs.prepare.outputs.tag }}" \
            --generate-notes \
            ${{ runner.temp }}/binaries/*.tar.gz \
            ${{ runner.temp }}/binaries/checksums-sha256.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    needs: [prepare, release]
    if: needs.prepare.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdbook-mermaid
        run: cargo install --git https://github.com/Alviner/mdbook-mermaid
      - name: Build book
        run: mdbook build docs
      - name: Build API reference
        run: cargo doc --no-deps --document-private-items
      - name: Copy API docs into book
        run: rm -rf docs/book/api && cp -r target/doc docs/book/api
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
